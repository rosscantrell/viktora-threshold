name: release

# Cross-platform release build for Viktora Threshold.
#
# Triggered when a tag matching `v*` is pushed (e.g., `v0.1.1`, `v0.2.0`).
# Builds Mac DMG (Apple Silicon) + Windows MSI (x86_64) in parallel via two
# runners, then attaches both as assets to a draft GitHub Release for the tag.
#
# After the action completes, you review the draft release on GitHub +
# publish it. Pilots install from the published release page.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # tauri-action needs this to create/update the release

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon runner (M-series)
            target: aarch64-apple-darwin
            artifact-name: macos-aarch64
          - platform: windows-latest    # Windows Server, x86_64
            target: x86_64-pc-windows-msvc
            artifact-name: windows-x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundle (DMG / MSI) and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Viktora Threshold ${{ github.ref_name }}"
          releaseBody: |
            Viktora Threshold ${{ github.ref_name }} — Mac + Windows pilot build with native in-process OCR (WP-OCR-13).

            ## Install

            See [PILOT-INSTALL.md](https://github.com/rosscantrell/viktora-threshold/blob/main/PILOT-INSTALL.md) for the full guide.

            **macOS (Apple Silicon):**
            1. Download the `.dmg` below
            2. Drag `Viktora Threshold.app` to `/Applications`
            3. Right-click → Open (one-time Gatekeeper bypass for unsigned v0.2)
            4. Launch normally on subsequent runs

            **Windows (x86_64, Windows 10 May 2020 update or later):**
            1. Download the `.msi` below
            2. Double-click to install (Windows SmartScreen may warn on unsigned builds — click "More info" → "Run anyway")
            3. Launch from Start menu

            All three capture gestures — Upload File, drag-drop, and Capture Screen — work on both platforms. Capture Screen uses Apple Vision on Mac and `Windows.Media.Ocr` on Windows; no external utility install required (the v0.1 `setup.sh` ceremony is gone).

            ## Known limitations

            - **Unsigned binaries** — Gatekeeper (Mac) / SmartScreen (Windows) ceremony required once per install. Code-signing tracked in v0.3+ (FN-OCR-13-02 + FN-OCR-13-03).
            - **Plain-text formats only** for file upload + drag-drop: `.txt`, `.md`, `.vtt`, `.srt`, `.html`. Rich formats (`.docx`, `.pdf`, `.pptx`) tracked in FN-OCR-12-02.
            - **`sourceApp` ships empty on screen captures** (FN-OCR-13-12). The click-driven Capture Screen flow makes Threshold the frontmost app at the moment of capture, so the pre-invocation lookup resolves to Threshold itself; the self-filter then maps it to `""` rather than ship misleading data. Symmetric across Mac + Windows. Architectural fix (NSWorkspace-activation-observer on Mac; equivalent on Windows) tracked in the compact-UX workstream for v0.3+.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

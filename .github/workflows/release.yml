name: release

# Cross-platform release build for Viktora Threshold.
#
# Triggered when a tag matching `v*` is pushed (e.g., `v0.1.1`, `v0.2.0`).
# Builds Mac DMG (Apple Silicon) + Windows MSI (x86_64) in parallel via two
# runners, then attaches both as assets to a draft GitHub Release for the tag.
#
# After the action completes, you review the draft release on GitHub +
# publish it. Pilots install from the published release page.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # tauri-action needs this to create/update the release

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon runner (M-series)
            target: aarch64-apple-darwin
            artifact-name: macos-aarch64
          - platform: windows-latest    # Windows Server, x86_64
            target: x86_64-pc-windows-msvc
            artifact-name: windows-x86_64

    runs-on: ${{ matrix.platform }}

    # Code-signing inputs. All are optional: when a secret/variable is unset the
    # corresponding signing step is skipped and that platform's build ships
    # unsigned (the old Gatekeeper / SmartScreen ceremony applies). Add the
    # secrets/variables described in SIGNING.md and the next tagged build is
    # automatically notarized (macOS) + signed (Windows) — no workflow edit
    # needed. Azure Trusted Signing reads CLIENT_ID/SECRET/TENANT_ID from the
    # environment; the endpoint/account/profile are non-secret config and live
    # in repo Variables.
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_ENDPOINT: ${{ vars.AZURE_ENDPOINT }}
      AZURE_ACCOUNT: ${{ vars.AZURE_ACCOUNT }}
      AZURE_PROFILE: ${{ vars.AZURE_PROFILE }}
      # Exposed at job level so the post-build DMG-notarization step can gate on
      # it (presence of the cert == macOS signing is configured).
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      # Windows code signing is done AFTER the build, by Microsoft's official
      # azure/trusted-signing-action (see the post-build step below). Earlier we
      # tried tauri's in-bundle `signCommand` + the third-party trusted-signing-cli,
      # but tauri swallows the signer's stderr, so an auth/role failure surfaced
      # only as an opaque "failed to run trusted-signing-cli". The official action
      # signs the produced installers and prints real errors.

      - name: Build Tauri bundle (DMG / MSI) and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. tauri-action activates signing only
          # when APPLE_CERTIFICATE is non-empty (otherwise ad-hoc/unsigned), and
          # notarizes + staples automatically when the APPLE_ID credentials are
          # present. All empty => unsigned build, no failure.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Viktora Threshold ${{ github.ref_name }}"
          releaseBody: |
            Viktora Threshold ${{ github.ref_name }} — Mac + Windows pilot build with native in-process OCR (WP-OCR-13).

            ## Install

            See [PILOT-INSTALL.md](https://github.com/rosscantrell/viktora-threshold/blob/main/PILOT-INSTALL.md) for the full guide.

            **macOS (Apple Silicon):**
            1. Download the `.dmg` below
            2. Open it and drag `Viktora Threshold.app` to `/Applications`
            3. Double-click to launch — it just opens (signed with our Apple Developer ID + notarized by Apple)

            **Windows (x86_64, Windows 10 May 2020 update or later):**
            1. Download `…_x64-setup.exe` below
            2. Double-click to install, then launch from the Start menu (signed installer — no SmartScreen "unrecognized app" wall)

            All three capture gestures — Upload File, drag-drop, and Capture Screen — work on both platforms. Capture Screen uses Apple Vision on Mac and `Windows.Media.Ocr` on Windows; no external utility install required (the v0.1 `setup.sh` ceremony is gone).

            > If a build was cut before code-signing secrets were configured it may still be unsigned — in that case follow the one-time bypass in [PILOT-INSTALL.md](https://github.com/rosscantrell/viktora-threshold/blob/main/PILOT-INSTALL.md).

            ## Known limitations

            - **Plain-text formats only** for file upload + drag-drop: `.txt`, `.md`, `.vtt`, `.srt`, `.html`. Rich formats (`.docx`, `.pdf`, `.pptx`) tracked in FN-OCR-12-02.
            - **`sourceApp` ships empty on Mac screen captures** (asymmetric finding from v0.3 widget rollout). The Mac widget click activates Threshold momentarily despite the v0.3 widget UX; the Mac `is_threshold_own_bundle_id` filter maps the self-reference to `""` rather than ship misleading data. **Windows captures DO attribute correctly** via `WS_EX_NOACTIVATE` shim (Phase 3) — empirically validated 2026-05-21 with `olk` (Outlook), `msedge` (Edge), etc. landing as the real `sourceApp` values. The Mac NSPanel-style shim follow-up is tracked as FN-CUX-12 in the WP-Threshold-Compact-UX AAR (`AAR-WP-Threshold-Compact-UX.md`).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # Sign the produced Windows installers with Microsoft's official Trusted
      # Signing action. It authenticates via AZURE_CLIENT_ID/SECRET/TENANT_ID
      # (job-level env) and signs the NSIS setup.exe + MSI under the bundle dir.
      # No-op unless Azure is configured.
      - name: Sign Windows installers (Azure Trusted Signing)
        if: matrix.platform == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_PROFILE }}
          files-folder: ${{ github.workspace }}/src-tauri/target/${{ matrix.target }}/release/bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # tauri-action uploaded the UNSIGNED installers during the build; replace
      # them on the release with the freshly-signed ones.
      - name: Re-upload signed Windows installers
        if: matrix.platform == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          mapfile -t FILES < <(find "$BUNDLE" -type f \( -name '*-setup.exe' -o -name '*.msi' \))
          if [ "${#FILES[@]}" -eq 0 ]; then echo "No signed installers found under $BUNDLE" >&2; exit 1; fi
          for f in "${FILES[@]}"; do
            echo "Re-uploading signed: $f"
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber --repo "${GITHUB_REPOSITORY}"
          done

      # tauri-action notarizes & staples the .app but NOT the .dmg container.
      # A downloaded (quarantined) un-notarized DMG still trips a Gatekeeper
      # "cannot be checked for malicious software" prompt when the user mounts it.
      # So notarize + staple the DMG too, then re-upload it over the asset
      # tauri-action already attached. No-op unless macOS signing is configured.
      - name: Notarize & staple the DMG (macOS, when signing configured)
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target -name '*.dmg' -print -quit)
          if [ -z "$DMG" ]; then echo "No DMG found to notarize" >&2; exit 1; fi
          echo "Notarizing DMG: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "Re-uploading stapled DMG over the release asset…"
          gh release upload "${GITHUB_REF_NAME}" "$DMG" --clobber --repo "${GITHUB_REPOSITORY}"

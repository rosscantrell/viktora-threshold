<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="widget.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Threshold</title>
    <script type="module" src="/widget.js" defer></script>
  </head>
  <body>
    <!--
      WP-Threshold-Compact-UX Phase 1 spike widget.
      ~100x100 floating widget; click center crosshair to fire run_screen_capture.
      Drag-to-move is implemented in widget.js via the Tauri `startDragging`
      API + a mousemove threshold heuristic — the `data-tauri-drag-region`
      attribute didn't fire mousedown reliably on this window config
      (S-CUX-05 finding 2026-05-21).
    -->
    <div id="widget">
      <button
        id="capture-btn"
        type="button"
        title="Capture region from screen"
        aria-label="Capture region from screen"
      >
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none"
             stroke="currentColor" stroke-width="1.75"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <line x1="12" y1="2" x2="12" y2="6"></line>
          <line x1="12" y1="18" x2="12" y2="22"></line>
          <line x1="2" y1="12" x2="6" y2="12"></line>
          <line x1="18" y1="12" x2="22" y2="12"></line>
          <circle cx="12" cy="12" r="1.5" fill="currentColor"></circle>
        </svg>
      </button>
      <div id="status-dot" class="status-unknown" title="Connectivity"></div>
    </div>
  </body>
</html>
